<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新发地价格行情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* iOS 风格开关（类似系统 Wi‑Fi 开关） */
    .ios-toggle {
      position: relative;
      width: 51px;
      height: 31px;
      border-radius: 9999px;
      background: #e9e9eb;
      border: none;
      cursor: pointer;
      padding: 2px;
      transition: background 0.2s ease;
      flex-shrink: 0;
      outline: none;
    }
    .ios-toggle:focus-visible {
      box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.45);
    }
    .ios-toggle[aria-checked="true"] {
      background: #34c759;
    }
    .ios-toggle-knob {
      display: block;
      width: 27px;
      height: 27px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.18), 0 1px 1px rgba(0, 0, 0, 0.08);
      transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateX(0);
    }
    .ios-toggle[aria-checked="true"] .ios-toggle-knob {
      transform: translateX(20px);
    }
    .ios-toggle:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
  </style>
</head>
<body class="bg-gray-50 p-4" data-xinfadi-api="{{ api_xinfadi | default('', true) | e }}">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">新发地价格行情</h1>

  <div class="flex flex-wrap items-center gap-3 mb-4">
    <input type="date" id="dateInput" value="{{ default_date }}" class="border border-gray-300 rounded-lg px-3 py-2">
    <button type="button" id="btnSearch" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">查询</button>
    <div class="flex items-center gap-2 pl-1" title="开启后翻页间隔更长，减轻对方站点压力">
      <span class="text-sm text-gray-600 whitespace-nowrap">礼貌爬取</span>
      <button type="button" id="politeSwitch" class="ios-toggle" role="switch" aria-checked="false" aria-label="礼貌爬取"><span class="ios-toggle-knob"></span></button>
      <span id="politeStateText" class="text-sm text-gray-500 min-w-[4.5rem]">…</span>
    </div>
  </div>
  <div class="flex flex-wrap items-center gap-3 mb-4">
    <label class="text-sm text-gray-600">菜品名称：</label>
    <input type="text" id="nameSearch" placeholder="输入品名模糊搜索" class="border border-gray-300 rounded-lg px-3 py-2 w-48">
    <label class="text-sm text-gray-600">一级分类：</label>
    <select id="categorySelect" class="border border-gray-300 rounded-lg px-3 py-2">
      <option value="">全部</option>
      <option value="蔬菜">蔬菜</option>
      <option value="水果">水果</option>
      <option value="肉禽蛋">肉禽蛋</option>
      <option value="水产">水产</option>
      <option value="粮油">粮油</option>
      <option value="豆制品">豆制品</option>
      <option value="调料">调料</option>
    </select>
  </div>
  <div id="progressWrap" class="hidden mb-4">
    <div class="h-6 bg-gray-200 rounded overflow-hidden"><div id="progressFill" class="h-full bg-blue-500 transition-all" style="width:0%"></div></div>
    <p id="progressText" class="text-sm text-gray-600 mt-1">正在拉取数据… 0%</p>
  </div>
  <div id="message" class="mb-3 text-sm hidden"></div>
  <div class="overflow-x-auto bg-white rounded-lg shadow">
    <table id="priceTable" class="w-full text-sm border-collapse">
      <thead><tr class="bg-gray-50 border-b border-gray-200">
        <th data-key="一级分类" class="text-left p-3 cursor-pointer hover:bg-gray-100">一级分类</th>
        <th data-key="二级分类" class="text-left p-3 cursor-pointer hover:bg-gray-100">二级分类</th>
        <th data-key="品名" class="text-left p-3 cursor-pointer hover:bg-gray-100">品名</th>
        <th data-key="最低价" class="text-left p-3 cursor-pointer hover:bg-gray-100">最低价</th>
        <th data-key="平均价" class="text-left p-3 cursor-pointer hover:bg-gray-100">平均价</th>
        <th data-key="最高价" class="text-left p-3 cursor-pointer hover:bg-gray-100">最高价</th>
        <th data-key="规格" class="text-left p-3 cursor-pointer hover:bg-gray-100">规格</th>
        <th data-key="产地" class="text-left p-3 cursor-pointer hover:bg-gray-100">产地</th>
        <th data-key="单位" class="text-left p-3 cursor-pointer hover:bg-gray-100">单位</th>
        <th data-key="发布日期" class="text-left p-3 cursor-pointer hover:bg-gray-100">发布日期</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div id="paginationBar" class="hidden mt-4 flex flex-wrap items-center justify-between gap-3">
    <div class="flex items-center gap-2 text-sm text-gray-600">
      <span>每页</span>
      <select id="pageSizeSelect" class="border rounded px-2 py-1"><option value="10" selected>10</option><option value="20">20</option><option value="50">50</option><option value="100">100</option></select>
      <span>条</span>
      <span id="paginationSummary" class="text-gray-400"></span>
    </div>
    <div id="paginationBtns" class="flex items-center gap-1"></div>
  </div>
  <p id="foot" class="mt-2 text-sm text-gray-500"></p>

  <script>
    /* 基址强制为「…/api/xinfadi」末尾，忽略 data 属性里多出来的路径段（避免出现 …/sqlite…/polite_crawl 等畸形 URL） */
    function normalizeXinfadiApiBase(raw) {
      raw = String(raw || "").trim();
      if (!raw) return "/api/xinfadi";
      try {
        var u = new URL(raw, window.location.href);
        u.pathname = "/api/xinfadi";
        u.search = "";
        u.hash = "";
        if (u.origin === window.location.origin) return "/api/xinfadi";
        var loc = window.location;
        function effPort(href) {
          if (href.port) return href.port;
          return href.protocol === "https:" ? "443" : "80";
        }
        /* 同一台机器上 uvicorn/Docker 可能把 Host 落成 127.0.0.1、容器 IP，而用户用 localhost 访问；
           只要协议+端口与当前页一致，就统一走相对路径（对 iframe 文档 origin 发请求），避免跨源。 */
        if (u.protocol === loc.protocol && effPort(u) === effPort(loc)) return "/api/xinfadi";
        return u.toString().replace(/\/$/, "");
      } catch (e) {
        return "/api/xinfadi";
      }
    }
    var API = normalizeXinfadiApiBase(
      document.body && document.body.getAttribute("data-xinfadi-api")
    );
    var COLS = ["一级分类","二级分类","品名","最低价","平均价","最高价","规格","产地","单位","发布日期"];
    var rawData = [], filteredList = [], currentPage = 1, pageSize = 10, sortKey = null, sortAsc = true;

    function showMessage(text, type) {
      var el = document.getElementById("message");
      el.textContent = text;
      el.className = "mb-3 text-sm " + (type === "error" ? "text-red-600" : type === "empty" ? "text-amber-600" : "text-blue-600");
      el.style.display = text ? "block" : "none";
    }
    function showProgress(show, pct, detail) {
      var wrap = document.getElementById("progressWrap");
      var fill = document.getElementById("progressFill");
      var text = document.getElementById("progressText");
      if (show) {
        wrap.classList.remove("hidden");
        fill.style.width = (pct || 0) + "%";
        var line = "正在拉取数据… " + (pct || 0) + "%";
        if (detail && detail.page > 0) {
          line += " · 第 " + detail.page + " 页";
          if (detail.est_pages > 0) line += " / 约 " + detail.est_pages + " 页";
          line += " · 百分比在「请求某一页」时会停住，新发地慢时可能达数十秒";
        }
        text.textContent = line;
      } else {
        wrap.classList.add("hidden");
      }
    }
    function renderTable(data) {
      var tbody = document.getElementById("tbody");
      tbody.innerHTML = "";
      if (!data || !data.length) return;
      data.forEach(function(row) {
        var tr = document.createElement("tr");
        tr.className = "border-b border-gray-100 hover:bg-gray-50";
        COLS.forEach(function(k) { var td = document.createElement("td"); td.className = "p-3"; td.textContent = row[k] != null ? row[k] : ""; tr.appendChild(td); });
        tbody.appendChild(tr);
      });
    }
    function renderPagination() {
      var total = filteredList.length, bar = document.getElementById("paginationBar"), summaryEl = document.getElementById("paginationSummary"), btnsEl = document.getElementById("paginationBtns");
      if (total === 0) { bar.classList.add("hidden"); document.getElementById("foot").textContent = rawData.length > 0 ? "筛选后 0 条" : ""; renderTable([]); return; }
      bar.classList.remove("hidden");
      var totalPages = Math.max(1, Math.ceil(total / pageSize));
      if (currentPage > totalPages) currentPage = totalPages;
      var start = (currentPage - 1) * pageSize, end = Math.min(start + pageSize, total);
      summaryEl.textContent = "共 " + total + " 条" + (rawData.length > 0 && total < rawData.length ? "（从 " + rawData.length + " 条中筛选）" : "");
      document.getElementById("foot").textContent = "第 " + (start + 1) + "–" + end + " 条，共 " + total + " 条";
      btnsEl.innerHTML = "";
      function addBtn(label, disabled, onClick) { var b = document.createElement("button"); b.className = "px-2 py-1 border rounded text-sm " + (disabled ? "text-gray-400 border-gray-200 cursor-not-allowed" : "border-gray-300 hover:border-blue-500 hover:text-blue-600"); b.textContent = label; b.disabled = disabled; b.onclick = onClick; btnsEl.appendChild(b); }
      addBtn("上一页", currentPage <= 1, function() { if (currentPage > 1) { currentPage--; renderPage(); } });
      var from = Math.max(1, currentPage - 2), to = Math.min(totalPages, from + 4);
      if (to - from < 4) from = Math.max(1, to - 4);
      for (var i = from; i <= to; i++) (function(p) {
        var b = document.createElement("button");
        b.className = "min-w-[32px] py-1 border rounded text-sm " + (p === currentPage ? "bg-blue-600 text-white border-blue-600" : "border-gray-300 hover:border-blue-500");
        b.textContent = p; b.onclick = function() { currentPage = p; renderPage(); };
        btnsEl.appendChild(b);
      })(i);
      addBtn("下一页", currentPage >= totalPages, function() { if (currentPage < totalPages) { currentPage++; renderPage(); } });
    }
    function renderPage() {
      var total = filteredList.length, totalPages = Math.max(1, Math.ceil(total / pageSize));
      if (currentPage > totalPages) currentPage = totalPages;
      var start = (currentPage - 1) * pageSize, pageData = filteredList.slice(start, start + pageSize);
      renderTable(pageData); renderPagination();
    }
    function applySort() {
      if (!sortKey || !filteredList.length) return;
      filteredList = filteredList.slice().sort(function(a, b) {
        var va = a[sortKey] != null ? String(a[sortKey]).trim() : "", vb = b[sortKey] != null ? String(b[sortKey]).trim() : "";
        var na = Number(va), nb = Number(vb);
        if (!isNaN(na) && !isNaN(nb)) return sortAsc ? na - nb : nb - na;
        return sortAsc ? (va < vb ? -1 : va > vb ? 1 : 0) : (vb < va ? -1 : vb > va ? 1 : 0);
      });
    }
    function applyFilter() {
      var nameLike = (document.getElementById("nameSearch").value || "").trim().toLowerCase(), category = (document.getElementById("categorySelect").value || "").trim();
      filteredList = rawData.filter(function(row) {
        var nameOk = !nameLike || (row["品名"] && row["品名"].toLowerCase().indexOf(nameLike) !== -1);
        var catOk = !category || (row["一级分类"] === category);
        return nameOk && catOk;
      });
      applySort(); currentPage = 1; renderPage();
    }
    function normDay(s) {
      if (s == null || s === "") return "";
      var t = String(s).trim().replace(/\//g, "-").split(/\s+/)[0];
      var parts = t.split("-");
      if (parts.length === 3) {
        var y = parseInt(parts[0], 10), m = parseInt(parts[1], 10), d = parseInt(parts[2], 10);
        if (!isNaN(y) && !isNaN(m) && !isNaN(d))
          return y + "-" + String(m).padStart(2, "0") + "-" + String(d).padStart(2, "0");
      }
      return t.slice(0, 10);
    }
    function rowsForSelectedDate(rows, dateYmd) {
      var want = normDay(dateYmd);
      if (!want || !rows || !rows.length) return [];
      return rows.filter(function(row) { return normDay(row["发布日期"]) === want; });
    }
    function sleep(ms) {
      return new Promise(function(resolve) { setTimeout(resolve, ms); });
    }
    function apiQs(date) {
      return "?date=" + encodeURIComponent(date) + "&_t=" + Date.now();
    }
    async function getData(date) {
      var r = await fetch(API + "/data" + apiQs(date), { cache: "no-store" });
      var body = await r.json();
      body.__httpStatus = r.status;
      return body;
    }
    async function getProgress(date) {
      var r = await fetch(API + "/progress" + apiQs(date), { cache: "no-store" });
      return r.json();
    }
    async function postCrawl(date) {
      var r = await fetch(API + "/crawl" + apiQs(date), { method: "POST", cache: "no-store" });
      var body = await r.json();
      return { ok: r.ok, status: r.status, body: body };
    }
    function setPoliteSwitchVisual(on) {
      var sw = document.getElementById("politeSwitch");
      var tx = document.getElementById("politeStateText");
      if (!sw) return;
      sw.dataset.polite = on ? "1" : "0";
      sw.setAttribute("aria-checked", on ? "true" : "false");
      if (tx) tx.textContent = on ? "开（礼貌）" : "关（快速）";
    }
    async function refreshPoliteSwitch() {
      var sw = document.getElementById("politeSwitch");
      var tx = document.getElementById("politeStateText");
      if (!sw) return;
      try {
        var r = await fetch(API + "/polite_crawl", { cache: "no-store" });
        var j = await r.json();
        setPoliteSwitchVisual(!!j.polite);
      } catch (e) {
        if (tx) tx.textContent = "加载失败";
      }
    }
    function finishQueryBtn() {
      document.getElementById("btnSearch").disabled = false;
    }
    function applyRowsFromResponse(res, date) {
      var preLen = (res.data || []).length;
      rawData = rowsForSelectedDate(res.data || [], date);
      applyFilter();
      if (rawData.length === 0) {
        var rows = res.data || [];
        showMessage(rows.length > 0 ? "返回数据发布日期与所选日期不一致" : "该日期暂无报价数据", rows.length > 0 ? "error" : "empty");
      } else {
        showMessage("");
      }
    }
    async function crawlPipeline(date) {
      var x = await postCrawl(date);
      var body = x.body;
      if (x.status === 409 && body && body.status === "busy") {
        showMessage((body.message || "请稍候再试") + (body.busy_date ? "（当前正在拉取：" + body.busy_date + "）" : ""), "error");
        return;
      }
      if (!x.ok) {
        showMessage("请求失败：" + (body && (body.message || body.detail) ? (body.message || body.detail) : x.status), "error");
        return;
      }
      if (body.status === "skipped_history") {
        showProgress(false);
        showMessage(body.message || "该日期未在本地缓存且超出演示允许的历史范围，已跳过全量拉取。", "error");
        return;
      }
      if (body.status === "cached" || body.status === "done") {
        applyRowsFromResponse(await getData(date), date);
        return;
      }
      if (body.status === "busy") {
        showMessage((body.message || "请稍候再试") + (body.busy_date ? "（当前正在拉取：" + body.busy_date + "）" : ""), "error");
        return;
      }
      if (body.status === "error") {
        showMessage("爬取失败：" + (body.message || ""), "error");
        return;
      }
      showProgress(true, body.progress || 0, null);
      var idleStreak = 0;
      for (;;) {
        var p = await getProgress(date);
        if (p.status === "done") {
          showProgress(false);
          applyRowsFromResponse(await getData(date), date);
          return;
        }
        if (p.status === "error") {
          showProgress(false);
          showMessage("爬取失败：" + (p.message || ""), "error");
          return;
        }
        if (p.status === "idle") {
          idleStreak++;
          if (idleStreak < 10) {
            await sleep(400);
            continue;
          }
          var res = await getData(date);
          if (res.data && res.data.length > 0) {
            showProgress(false);
            applyRowsFromResponse(res, date);
            return;
          }
          if (res.error) {
            showProgress(false);
            showMessage("错误：" + res.error, "error");
            return;
          }
          showProgress(false);
          showMessage("拉取状态已丢失（可能后端重启、任务异常结束或与浏览器不同步）。请再点一次「查询」。", "error");
          return;
        }
        idleStreak = 0;
        showProgress(true, p.progress, { page: p.page, est_pages: p.est_pages });
        await sleep(500);
      }
    }
    async function runQuery() {
      var date = document.getElementById("dateInput").value;
      if (!date) {
        showMessage("请选择日期", "error");
        return;
      }
      showMessage("");
      showProgress(false);
      rawData = [];
      filteredList = [];
      sortKey = null;
      currentPage = 1;
      renderTable([]);
      document.getElementById("paginationBar").classList.add("hidden");
      document.getElementById("foot").textContent = "";
      document.getElementById("btnSearch").disabled = true;
      try {
        var res = await getData(date);
        /* 首包返回后立刻恢复「查询」，避免 crawlPipeline 长时间轮询时按钮一直灰掉 */
        finishQueryBtn();
        if (res.data && res.data.length > 0) {
          rawData = rowsForSelectedDate(res.data, date);
          if (rawData.length > 0) {
            applyFilter();
            showMessage("");
            return;
          }
          showMessage("接口返回的发布日期与所选日期不一致（所选 " + normDay(date) + "）。若刚切换日期，请等待其它日期的拉取结束后再查。", "error");
          renderTable([]);
          return;
        }
        if (res.status === "crawling" || (res.data && res.data.length === 0 && !res.error)) {
          await crawlPipeline(date);
          return;
        }
        if (res.error) showMessage("错误：" + res.error, "error");
        else showMessage("该日期暂无报价数据", "empty");
        rawData = [];
        renderTable([]);
      } catch (e) {
        showProgress(false);
        showMessage("请求失败：" + (e && e.message ? e.message : String(e)), "error");
      } finally {
        finishQueryBtn();
      }
    }
    document.getElementById("btnSearch").onclick = function() { runQuery(); };
    document.getElementById("politeSwitch").onclick = async function() {
      var sw = this;
      if (sw.disabled) return;
      var next = sw.dataset.polite !== "1";
      sw.disabled = true;
      try {
        var body = new URLSearchParams();
        body.set("polite", next ? "true" : "false");
        var r = await fetch(API + "/polite_crawl", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: body.toString(),
          cache: "no-store"
        });
        if (!r.ok) throw new Error("HTTP " + r.status);
        await refreshPoliteSwitch();
        showMessage(next ? "已开启礼貌爬取（翻页更慢）" : "已关闭礼貌爬取（快速拉取）", "info");
      } catch (e) {
        showMessage("切换失败：" + (e && e.message ? e.message : String(e)), "error");
      } finally {
        sw.disabled = false;
      }
    };
    refreshPoliteSwitch();
    document.getElementById("nameSearch").oninput = applyFilter; document.getElementById("categorySelect").onchange = applyFilter;
    document.getElementById("pageSizeSelect").onchange = function() { pageSize = parseInt(this.value, 10); currentPage = 1; if (filteredList.length > 0) renderPage(); };
    var thead = document.querySelector("#priceTable thead tr"); if (thead) thead.querySelectorAll("th").forEach(function(th) {
      th.onclick = function() { var key = th.getAttribute("data-key"); if (COLS.indexOf(key) === -1) return; sortAsc = sortKey === key ? !sortAsc : true; sortKey = key; applySort(); renderPage(); };
    });
    if (document.getElementById("dateInput").value) runQuery();
  </script>
</body>
</html>
