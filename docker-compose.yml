services:
  # 本地 MySQL，供 Navicat 连接：主机 localhost / 端口 3306 / 库 agent / 用户 root / 密码见 MYSQL_ROOT_PASSWORD（仅本地开发）
  mysql:
    # 直连 hub 易 EOF 时可改用镜像站；海外环境可改回 mysql:8.0
    image: docker.1ms.run/library/mysql:8.0
    container_name: agent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "116165"
      MYSQL_DATABASE: agent
      TZ: Asia/Shanghai
    ports:
      # 若本机 3306 已被其他 MySQL 占用（如 fastapi-mysql），改用 3307 供 Navicat 连接
      - "3307:3306"
    volumes:
      - agent-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  agent:
    build: .
    image: agent:latest
    container_name: Agent
    depends_on:
      - mysql
    ports:
      - "8000:8000"
    volumes:
      # 持久化数据库、数据集、模型、日志等
      - agent-data:/app/backend/data
    environment:
      - PYTHONUNBUFFERED=1
      # 容器内访问 compose 中的 MySQL 服务（宿主机 Navicat 仍用 127.0.0.1:3307）
      - INSIGHTS_MYSQL_HOST=mysql
      - INSIGHTS_MYSQL_PORT=3306
      - INSIGHTS_MYSQL_USER=root
      - INSIGHTS_MYSQL_PASSWORD=116165
      - INSIGHTS_MYSQL_DATABASE=agent
      # SXW 业务数据库（物流模块数据源）
      - SXW_MYSQL_HOST=1.92.102.228
      - SXW_MYSQL_PORT=3306
      - SXW_MYSQL_USER=edu_std_supp
      - SXW_MYSQL_PASSWORD=THwnkTSQbcCCrsey
      - SXW_MYSQL_DATABASE=edu_std_supp
      - SXW_MYSQL_SUPP_CODE=10133
      # 高德地图
      - AMAP_JSAPI_KEY=569a5415d46ab17dc766bdbd4035d55b
      - AMAP_SECURITY_JSCODE=bf85102866042d3d6c0c00f3785bb765
      # 北斗 GPS18
      - GPS18_OPENAPI_BASE=http://openapi.18gps.net
      - GPS18_LOGIN_NAME=食迅易联
      - GPS18_LOGIN_PASSWORD=123456
      # 萤石(YS7)摄像头
      - YS7_APP_KEY=29707e97f5554334a511c927198ad054
      - YS7_APP_SECRET=a2d8d535eb850a3b90b0df3e51681b5c
      # 可选：=1 时用 m3u8 填 hls 走原生 <video>（设备须 H.264）；默认不 set，与 PHP 一致保留 ezopen + 前端 EZUIKit（可播 H.265）
      # - YS7_BROWSER_HLS_FALLBACK=1
      # 乐橙(IMOU)摄像头
      - IMOU_APP_ID=lc8bd3fe83f0e9460b
      - IMOU_APP_SECRET=36ab7437dabd488da728f4f2b527e4
    restart: unless-stopped

volumes:
  agent-data:
  agent-mysql-data:
